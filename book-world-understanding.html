<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <title>我们如何理解这个世界 | Books & Culture</title>
  <meta name="description" content="齐格蒙特·鲍曼《我们如何理解这个世界》阅读专页。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: #333333;
      background: #fbfaf8;
      font-family: "Source Serif 4", "Noto Serif SC", serif;
      line-height: 1.8;
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 18px 72px;
    }

    .topbar {
      border-bottom: 0.5px solid #e6e1d9;
      padding: 18px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand {
      font-family: "Playfair Display", serif;
      letter-spacing: 0.08em;
      font-size: 14px;
      text-transform: uppercase;
      color: #262626;
      text-decoration: none;
    }

    .breadcrumb {
      font-size: 13px;
      color: #6d6a63;
      letter-spacing: 0.03em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .lang-switch {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .lang-switch button {
      border: none;
      background: transparent;
      color: #8b857b;
      font-family: "Playfair Display", serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
    }

    .lang-switch button.active {
      color: #1d1a16;

    }

    .hero {
      margin: 0;
      text-align: left;
    }

    .lead-layout {
      max-width: 980px;
      margin: 46px auto 10px;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
      gap: 34px;
      align-items: start;
    }

    .kicker {
      margin: 0 0 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #7b766d;
      font-family: "Playfair Display", serif;
    }

    h1 {
      margin: 0;
      font-family: "Playfair Display", "Noto Serif SC", serif;
      font-size: clamp(34px, 6vw, 56px);
      line-height: 1.15;
      color: #101010;
      letter-spacing: 0.01em;
    }

    .dek {
      margin: 16px 0 18px;
      font-size: clamp(19px, 2.3vw, 24px);
      color: #3f3a33;
      line-height: 1.55;
    }

    .byline {
      margin: 0;
      font-size: 12px;
      color: #666056;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: "Playfair Display", serif;
    }

    .meta-row {
      margin-top: 10px;
      font-size: 12px;
      color: #7b766d;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: "Playfair Display", serif;
    }

    .lead-visual {
      margin: 0;
      max-width: 420px;
      justify-self: end;
    }

    .lead-visual img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: contain;
      background: #f3efe8;
      border: 0.5px solid #e4dfd7;
      display: block;
    }

    .caption {
      margin: 8px 0 0;
      font-size: 12px;
      color: #7a756d;
    }

    /* ── Dynamic review & excerpts injected by JS ── */

    /* 书评区容器 */
    #review-section {
      max-width: 700px;
      margin: 36px auto 0;
      padding: 60px 24px 48px;
      background-color: #fbfaf8;
      color: #242424;
      font-family: "Lora", "Noto Serif SC", Georgia, serif;
      font-size: 18px;
      line-height: 1.9;
      text-align: justify;
      letter-spacing: 0.012em;
    }

    /* 书评末尾署名 —— 独立隔离，防止触发首字下沉 */
    .review-signature {
      text-align: right;
      font-size: 14px;
      color: #888;
      font-family: "Inter", "Helvetica Neue", sans-serif;
      margin-top: 30px;
      border-top: 1px solid #e8e4de;
      padding-top: 14px;
    }
    .review-signature::first-letter {
      float: none !important;
      font-size: inherit !important;
      font-weight: normal !important;
      padding: 0 !important;
      color: inherit !important;
    }
      font-family: "Lora", "Noto Serif SC", Georgia, serif;
      font-size: 18px;
      line-height: 1.9;
      color: #242424;
      text-align: justify;
    }

    .ny-review-text p,
    #review-section p { margin: 0 0 1.5em; }

    /* 首字下沉：精确对齐前两行 */
    #review-section p:first-of-type::first-letter,
    .ny-review-text p:first-of-type::first-letter {
      float: left;
      font-family: "Playfair Display", "STSong", "Songti SC", serif;
      font-size: 4.2rem;
      line-height: 0.82;
      padding-top: 6px;
      padding-right: 12px;
      margin-bottom: -4px;
      font-weight: 700;
      color: #000;
    }

    /* 降级提示不触发首字下沉 */
    .no-dropcap::first-letter {
      float: none !important;
      font-size: inherit !important;
      font-weight: normal !important;
      padding: 0 !important;
      color: inherit !important;
    }

    /* 摘录区分隔线 */
    .excerpts-divider {
      border: none;
      border-top: 1px solid #e5e2dc;
      max-width: 700px;
      margin: 52px auto 0;
    }

    /* 摘录容器 */
    #excerpts-section {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 24px 72px;
    }

    /* 摘录双语标题 */
    .excerpts-heading {
      text-align: center;
      margin: 48px 0 44px;
      line-height: 1.4;
    }
    .excerpts-heading .zh {
      display: block;
      font-family: "Noto Serif SC", "Lora", serif;
      font-size: 17px;
      font-weight: 700;
      color: #111;
      letter-spacing: 0.1em;
    }
    .excerpts-heading .en {
      display: block;
      font-family: "Playfair Display", "Lora", serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: #999;
      margin-top: 5px;
    }

    /* 单条摘录 */
    .excerpt-item {
      padding-left: 22px;
      margin-bottom: 44px;
      border-left: 1px solid #d3cfc5;
    }

    .excerpt-content {
      font-family: "Lora", "Noto Serif SC", Georgia, serif;
      font-size: 16px;
      line-height: 1.7;
      color: #333;
      white-space: pre-line;
    }

    .excerpt-page {
      display: block;
      text-align: right;
      font-size: 13px;
      color: #888;
      font-style: italic;
      margin-top: 10px;
      letter-spacing: 0.02em;
    }

    /* 加载占位 */
    .loading-placeholder {
      color: #aaa;
      font-style: italic;
      font-size: 0.95rem;
      text-align: center;
      padding: 2rem 0;
    }

    .article,
    .article-container {
      max-width: 700px;
      margin: 36px auto 0;
      padding: 60px 20px;
      background-color: #fbfaf8;
      color: #333333;
      font-family: "Source Serif 4", "Noto Serif SC", serif;
      font-size: 19px;
      line-height: 1.8;
      text-align: justify;
    }

    .article p,
    .article-container p {
      margin: 0 0 22px;
    }

    .article p:first-of-type::first-letter,
    .article-container p:first-of-type::first-letter,
    .first-paragraph::first-letter {
      float: left;
      font-family: "STSong", "Songti SC", "Noto Serif SC", serif;
      font-size: 5.6rem;
      line-height: 1;
      padding-right: 12px;
      font-weight: 700;
      color: #0f0f0f;
    }

    .pullquote,
    .excerpt-text {
      margin: 34px 0;
      padding: 6px 0 6px 16px;
      border-left: 1px solid #111111;
      font-family: "Source Serif 4", "Noto Serif SC", serif;
      font-size: 19px;
      line-height: 1.8;
      color: #333333;
      letter-spacing: 0.02em;
    }

    .quote-source {
      margin-top: 8px;
      font-size: 11px;
      font-family: "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b665f;
    }

    hr {
      border: 0;
      border-top: 0.5px solid #e0e0e0;
      margin: 40px 0;
    }

    .back {
      max-width: 680px;
      margin: 40px auto 0;
    }

    .pager {
      max-width: 680px;
      margin: 28px auto 0;
      padding-top: 18px;
      border-top: 0.5px solid #e6e1d9;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      font-size: 0.95rem;
    }

    .pager a {
      color: #5a554e;
      text-decoration: none;
      line-height: 1.5;
    }

    .pager a:hover {
      text-decoration: underline;
    }

    .pager .next {
      text-align: right;
    }

    .back a {
      color: #5a554e;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .back a:hover { text-decoration: underline; }

    @media (max-width: 680px) {
      .article { font-size: 1.13rem; }
      .pullquote { padding: 14px 0; }
    }

    @media (max-width: 900px) {
      .lead-layout {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .lead-visual {
        max-width: 100%;
        justify-self: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="shell">

      <a class="brand" href="reading.html">Books & Culture</a>

    <section class="lead-layout">
      <div class="hero">
        <p class="kicker" data-zh="深度书评" data-en="Under Review" data-fr="Analyse">深度书评</p>
        <h1 data-zh="我们如何理解这个世界" data-en="How We Understand the World" data-fr="Comment comprendre le monde">我们如何理解这个世界</h1>
        <p class="dek" data-zh="特斯特：在这次对话的最后，你能用一段话来总结你的关切吗？鲍曼：那就给你一句话吧，不过不是我说的——是阿尔贝 •加缪说的：这世界上有美，也有受辱者。无论这项事业可能带来什么困难，我都希望永远不对后者或前者不忠。" data-en="特斯特：在这次对话的最后，你能用一段话来总结你的关切吗？鲍曼：那就给你一句话吧，不过不是我说的——是阿尔贝 •加缪说的：这世界上有美，也有受辱者。无论这项事业可能带来什么困难，我都希望永远不对后者或前者不忠。" data-fr="特斯特：在这次对话的最后，你能用一段话来总结你的关切吗？鲍曼：那就给你一句话吧，不过不是我说的——是阿尔贝 •加缪说的：这世界上有美，也有受辱者。无论这项事业可能带来什么困难，我都希望永远不对后者或前者不忠。">特斯特：在这次对话的最后，你能用一段话来总结你的关切吗？鲍曼：那就给你一句话吧，不过不是我说的——是阿尔贝 •加缪说的：这世界上有美，也有受辱者。无论这项事业可能带来什么困难，我都希望永远不对后者或前者不忠。</p>
        <p class="byline" data-zh="作者：齐格蒙特·鲍曼 · 读书笔记：Meiya" data-en="By Zygmunt Bauman · Notes by Meiya" data-fr="Par Zygmunt Bauman · Notes par Meiya">作者：齐格蒙特·鲍曼 · 读书笔记：Meiya</p>
        <p class="meta-row" data-zh="2026年4月30日 · 约8分钟阅读" data-en="April 30, 2026 · 8 min read" data-fr="30 avril 2026 · 8 min de lecture">2026年4月30日 · 约8分钟阅读</p>

      <figure class="lead-visual">

      </figure>

    <!-- ① 书评区：由 JS 从 API 动态注入 (book_id=1) -->
    <section id="review-section">
      <p class="loading-placeholder">正在加载书评…</p>
    </section>

    <!-- ② 摘录区：由 JS 从 API 动态注入（含标题和分隔线） -->
    <hr class="excerpts-divider" id="excerpts-divider" style="display:none" />
    <section id="excerpts-section" style="display:none"></section>

    <nav class="pager" aria-label="article navigation">

  <script>
    /* ── 语言切换 ── */
    function setLanguage(lang) {
      document.documentElement.lang = lang === "zh" ? "zh-CN" : lang;
      document.querySelectorAll("[data-zh][data-en][data-fr]").forEach((node) => {
        node.textContent = node.getAttribute(`data-${lang}`);
      });
      document.getElementById("btn-zh").classList.toggle("active", lang === "zh");
      document.getElementById("btn-en").classList.toggle("active", lang === "en");
      document.getElementById("btn-fr").classList.toggle("active", lang === "fr");
    }
    document.getElementById("btn-zh").addEventListener("click", () => setLanguage("zh"));
    document.getElementById("btn-en").addEventListener("click", () => setLanguage("en"));
    document.getElementById("btn-fr").addEventListener("click", () => setLanguage("fr"));

    /* ── 书评与摘录动态加载 ── */
    document.addEventListener("DOMContentLoaded", function () {
      // 换书只需改这一行
      const BOOK_ID = 1;
      loadBookContent(BOOK_ID);
    });

    async function loadBookContent(bookId) {
      const reviewContainer   = document.getElementById("review-section");
      const excerptsContainer = document.getElementById("excerpts-section");
      const divider           = document.getElementById("excerpts-divider");

      try {
        const response = await fetch(`/api/book/${bookId}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();

        /* ── 书评 ── */
        if (data.review_content && data.review_content.trim()) {
          const paras = data.review_content
            .split('\n')
            .map(s => s.trim())
            .filter(s => s.length > 0)
            .map(s => `<p>${s}</p>`)
            .join('');
          reviewContainer.innerHTML =
            `<div class="ny-review-text">${paras}</div>` +
            `<div class="review-signature">—— MEIYA</div>`;
        } else {
          reviewContainer.innerHTML = `<p style="color:#999;font-style:italic;">暂无书评内容。</p>`;
        }

        /* ── 摘录 ── */
        if (data.excerpts && data.excerpts.length > 0) {
          let html = `<h2 class="excerpts-heading"><span class="zh">摘录与金句</span><span class="en">EXCERPTS</span></h2>`;
          data.excerpts.forEach(item => {
            html += `
              <div class="excerpt-item">
                <div class="excerpt-content">${escHtml(item.content)}</div>
                ${item.page_number ? `<span class="excerpt-page">— p. ${item.page_number}</span>` : ""}
              </div>`;
          });
          excerptsContainer.innerHTML = html;
          excerptsContainer.style.display = "block";
          divider.style.display = "";
        } else {
          excerptsContainer.style.display = "none";
          divider.style.display = "none";
        }

      } catch (error) {
        console.error('Failed to load book content, running silent degradation:', error);
        reviewContainer.innerHTML = `<p class="no-dropcap" style="color:#999; text-align:center; padding: 40px 0; font-family: sans-serif;">《思维在阅读中苏醒》的篇章正在书架上整理中...</p>`;
        excerptsContainer.style.display = "none";
        divider.style.display = "none";
      }
    }

    function escHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
