<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News | Une vie pensée</title>
  <meta name="description" content="新闻 | News. Une vie pensée." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #2b4c63;
      --ink: #1f2428;
      --muted: #5a667d;
      --line: #cdd5db;
      --ease: 220ms cubic-bezier(0.2, 0.75, 0.3, 1);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--ink);
      background: #fcfaf6;
      font-family: "Crimson Text", "Noto Serif SC", serif;
      line-height: 1.7;
    }

    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 16px 72px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
      border-bottom: none;
      background: rgba(252, 250, 246, 0.95);
      backdrop-filter: blur(8px);
      box-shadow: none;
    }

    .topbar-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 14px 0;
      gap: 6px;
    }

    .nav-toggle {
      display: none;
      border: none;
      background: transparent;
      color: #1f2428;
      font-family: "Playfair Display", serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
    }

    .nav-close {
      display: none;
    }

    .logo-stack {
      min-width: auto;
      text-align: center;
      font-family: "Playfair Display", serif;
      font-size: 20px;
      line-height: 1.5;
      letter-spacing: 0.15em;
      text-transform: none;
      color: #1f2428;
      white-space: normal;
      padding: 24px 0;
      width: 100%;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 16px 0;
      border-bottom: 4px double #1f2428;
    }

    .nav-overlay {
      display: none;
    }

    .nav a,
    .lang button {
      text-decoration: none;
      color: #1f2428;
      border-radius: 0;
      border: none;
      padding: 0;
      font-size: 13px;
      font-weight: 400;
      font-family: "Playfair Display", serif;
      background: transparent;
      cursor: pointer;
      transition: opacity var(--ease);
      letter-spacing: 0.08em;
      text-transform: capitalize;
      display: flex;
      flex-direction: row;
      align-items: baseline;
      gap: 8px;
      line-height: 1.2;
    }

    .nav a span {
      font-size: 11px;
      color: #575757;
      font-weight: 400;
      font-family: "Crimson Text", serif;
      letter-spacing: 0;
      text-transform: none;
      display: inline;
    }

    .nav a:hover {
      opacity: 1;
      transform: none;
      border: none;
      background: transparent;
      text-decoration: underline;
    }

    .lang button {
      padding: 0;
      font-size: 12px;
      font-family: "Crimson Text", serif;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #1f2428;
    }

    .lang button:hover,
    .lang button.active {
      border-color: transparent;
      background: transparent;
      color: #1f2428;
      transform: none;
      opacity: 0.6;
    }

    .lang button.active {
      opacity: 1;
      font-weight: 700;
    }

    .page-header {
      text-align: center;
      padding: 64px 0 48px;
      border-bottom: 4px double #1f2428;
      margin-bottom: 0;
    }

    .page-header h1 {
      margin: 0 0 12px;
      font-family: "Playfair Display", serif;
      font-size: 48px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #1f2428;
      line-height: 1.2;
    }

    .page-header .page-sub {
      font-size: 12px;
      color: #a8a8a8;
      font-weight: 400;
      font-family: "Crimson Text", serif;
      letter-spacing: 0;
    }

    /* ======== NEWS ARTICLE BODY ======== */
    .article-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 0 40px;
      background: transparent;
    }

    .articles-list { display: flex; flex-direction: column; }

    /* --- FEATURED (first item) --- */
    .article-item.is-featured {
      display: flex;
      flex-direction: row;
      gap: 52px;
      align-items: flex-start;
      margin-bottom: 60px;
      padding: 40px;
      padding-bottom: 60px;
      border-bottom: 1px solid #e0dbd3;
      background: #F7F8F9;
    }

    .featured-text {
      flex: 0 0 55%;
      max-width: 55%;
      display: flex;
      flex-direction: column;
    }

    /* subtlePulse — breathing scale animation */
    @keyframes subtlePulse {
      0%   { transform: scale(1)    translateY(0);       }
      50%  { transform: scale(1.05) translateY(-4px);    }
      100% { transform: scale(1)    translateY(0);       }
    }

    .featured-image {
      flex: 0 0 calc(45% - 52px);
      min-width: 0;
      overflow: hidden;
      border-radius: 4px;
    }

    .featured-image figure {
      margin: 0; padding: 0; border: none; background: none;
      overflow: hidden;
      border-radius: 4px;
    }

    /* Shared base for img & video inside .interactive-art */
    .interactive-art {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      border-radius: 4px;
      /* subtle tonal blend with linen background */
      filter: sepia(8%) contrast(1.02);
      mix-blend-mode: multiply;
      transition: filter 0.5s ease, transform 0.5s ease;
      animation: subtlePulse 10s ease-in-out infinite;
    }

    /* hover: lift saturation & contrast slightly */
    .article-item.is-featured:hover .interactive-art {
      filter: sepia(0%) contrast(1.08) saturate(1.1);
      animation-play-state: paused;
    }

    .featured-image figure figcaption {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 10px; color: #aaa; letter-spacing: 0.08em; margin-top: 6px;
    }

    /* --- CARD (items 1+) --- */
    .article-item.is-card {
      display: flex;
      gap: 36px;
      align-items: flex-start;
      padding: 36px 0;
      border-bottom: 1px solid #e0dbd3;
    }
    .article-item.is-card:last-child { border-bottom: none; }

    .card-thumb { flex: 0 0 38%; max-width: 38%; }
    .card-thumb img { width: 100%; height: 220px; object-fit: cover; display: block; }
    .card-thumb-empty { flex: 0 0 38%; max-width: 38%; height: 220px; background: #ede9e2; }
    .card-body { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; }

    /* --- SHARED --- */
    .news-meta {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 11px; color: #888; letter-spacing: 0.2em;
      text-transform: uppercase; margin-bottom: 10px; line-height: 1.4;
    }

    .article-item h2 {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.65rem; font-weight: 400; line-height: 1.2;
      color: #000; margin: 0 0 12px;
    }
    .article-item.is-featured .news-meta {
      color: #bbb;
      letter-spacing: 0.25em;
    }

    .article-item.is-featured h2 {
      font-size: 2.2rem; line-height: 1.2; margin-bottom: 16px;
    }

    /* Two-line clamp summary */
    .article-excerpt {
      font-family: 'Crimson Text', 'Noto Serif SC', serif;
      font-size: 16px; line-height: 1.72; color: #444;
      margin: 0 0 20px;
      display: -webkit-box; -webkit-box-orient: vertical;
      -webkit-line-clamp: 2; overflow: hidden;
      flex: 1;
    }
    .article-item.is-featured .article-excerpt {
      -webkit-line-clamp: 3; font-size: 17px;
    }

    /* READ FULL ARTICLE */
    .read-more {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: #1f2428;
      text-decoration: none; transition: color 0.18s;
      margin-top: 2rem; align-self: flex-start;
    }
    .read-more:hover { color: #888; }

    /* --- 3-COL GRID (items 4+) --- */
    .news-grid {
      max-width: 900px; margin: 48px auto 0;
      padding-top: 40px; border-top: 1px solid #e0dbd3;
    }
    .news-grid-label {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 11px; color: #888; letter-spacing: 0.2em;
      text-transform: uppercase; margin-bottom: 28px;
    }
    .news-grid-list {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 36px; background: #F7F8F9; padding: 32px;
    }
    .grid-item h3 {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.1rem; font-weight: 400; line-height: 1.3;
      color: #000; margin: 0 0 8px;
    }
    .grid-item-meta {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 10px; color: #888; letter-spacing: 0.15em; text-transform: uppercase;
    }

    .back-home { max-width: 900px; margin: 0 auto; padding: 0 0 48px; }
    .back-home a {
      color: #a8a8a8; text-decoration: none;
      font-family: 'Crimson Text', serif; font-size: 0.95rem;
      letter-spacing: 0.05em; display: inline-flex; align-items: center;
      gap: 6px; transition: color 0.2s;
    }
    .back-home a:hover { color: #1f2428; }
    .back-home a::before { content: "←"; font-size: 1rem; }

    footer {
      padding-top: 20px; border-top: 1px solid #1f2428;
      text-align: center; color: #1f2428;
      font-size: 0.9rem; font-family: 'Crimson Text', serif;
    }

    @media (max-width: 960px) {
      .article-body { padding: 48px 0; }
      .news-grid-list { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 760px) {
      .article-item.is-featured { flex-direction: column; gap: 28px; padding: 24px; }
      .featured-text, .featured-image { flex: none; max-width: 100%; width: 100%; }
    }

    @media (max-width: 680px) {
      .article-item.is-card { flex-direction: column; }
      .card-thumb, .card-thumb-empty { flex: none; max-width: 100%; }
      .card-thumb img, .card-thumb-empty { height: 200px; }
      .news-grid-list { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .topbar-header {
        justify-content: space-between;
        padding: 10px 0;
      }

      .nav-toggle { display: inline-block; }

      .logo-stack {
        font-size: 14px;
        padding: 16px 0;
        letter-spacing: 0.1em;
      }

      .nav {
        position: fixed;
        top: 0;
        left: 0;
        width: min(62vw, 260px);
        height: 100vh;
        flex-direction: column;
        flex-wrap: nowrap;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 12px;
        padding: 84px 14px 20px;
        border-bottom: none;
        border-right: 1px solid #1f2428;
        background: #fcfaf6;
        transform: translateX(-110%);
        transition: transform var(--ease);
        z-index: 25;
      }

      .nav a { font-size: 14px; }
      .nav a span { font-size: 12px; }

      .nav-close {
        display: inline-block;
        border: none;
        background: transparent;
        color: #1f2428;
        font-family: "Playfair Display", serif;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 0;
        margin-bottom: 8px;
        cursor: pointer;
      }

      body.nav-open .nav { transform: translateX(0); }

      .nav-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.2);
        z-index: 20;
      }

      body.nav-open .nav-overlay { display: block; }
      body.nav-open { overflow: hidden; }

      .page-header h1 {
        font-size: 32px;
      }

  </style>

  <style>
    body {
      background: #F9F7F2;
      color: #1A1A1A;
      font-family: "Times New Roman", Georgia, serif;
      margin: 0;
      padding: 0;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 20px 72px;
    }

    .masthead {
      position: relative;
      margin-bottom: 32px;
    }

    .masthead-quote {
      margin: 18px 0 12px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #1A1A1A;
    }

    .masthead-rule {
      height: 1px;
      background: #1A1A1A;
      opacity: 0.9;
    }

    .topbar-header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 0;
      background: rgba(249, 247, 242, 0.96);
      backdrop-filter: blur(8px);
    }

    .brand {
      flex: 0 0 auto;
      color: #1A1A1A;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1 1 auto;
      gap: 28px;
      min-width: 0;
    }

    .nav a {
      position: relative;
      color: #1A1A1A;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 4px 0;
      white-space: nowrap;
    }

    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 180ms ease;
    }

    .nav a:hover::after,
    .nav a:focus-visible::after {
      transform: scaleX(1);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 18px;
      flex: 0 0 auto;
    }

    .search-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #1A1A1A;
      cursor: pointer;
    }

    .search-button svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .lang {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .lang button {
      padding: 0;
      border: 0;
      background: transparent;
      color: #8B8578;
      font: inherit;
      cursor: pointer;
      transition: color 160ms ease, opacity 160ms ease;
    }

    .lang button.active {
      color: #1A1A1A;
    }

    .lang-separator {
      color: #8B8578;
      user-select: none;
    }

    .nav-toggle,
    .nav-close {
      display: none;
      border: 0;
      background: transparent;
      color: #1A1A1A;
      font-family: "Times New Roman", serif;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
    }

    .nav-overlay {
      display: none;
    }

    .page-header {
      text-align: center;
      padding: 42px 0 40px;
      border-bottom: 1px solid #1A1A1A;
      margin-bottom: 0;
    }

    .page-header h1 {
      margin: 0 0 12px;
      font-family: "Times New Roman", Georgia, serif;
      font-size: clamp(44px, 7vw, 86px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #1A1A1A;
      line-height: 1;
    }

    .page-header .page-sub {
      font-size: 11px;
      color: #8B8578;
      font-weight: 400;
      font-family: "Times New Roman", serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .article-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 0 40px;
    }

    .back-home {
      max-width: 900px;
      padding: 0 0 48px;
    }

    footer {
      margin-top: 0;
      padding-top: 20px;
      border-top: 1px solid #1A1A1A;
      text-align: center;
      color: #1A1A1A;
      font-size: 0.9rem;
      font-family: "Times New Roman", serif;
    }

    @media (max-width: 860px) {
      .nav {
        gap: 20px;
      }

      .brand {
        letter-spacing: 0.22em;
      }
    }

    @media (max-width: 720px) {
      .topbar-header {
        gap: 12px;
      }

      .nav {
        position: fixed;
        top: 0;
        right: 0;
        width: min(84vw, 320px);
        height: 100vh;
        padding: 92px 20px 24px;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 18px;
        background: #F9F7F2;
        border-left: 1px solid #1A1A1A;
        transform: translateX(110%);
        transition: transform 180ms ease;
        z-index: 40;
      }

      .nav-toggle {
        display: inline-flex;
        align-items: center;
      }

      .nav-close {
        display: inline-flex;
      }

      .nav-actions {
        gap: 14px;
      }

      .search-button,
      .lang {
        display: none;
      }

      body.nav-open .nav {
        transform: translateX(0);
      }

      body.nav-open .nav-overlay {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(26, 26, 26, 0.18);
        z-index: 35;
      }

      body.nav-open {
        overflow: hidden;
      }

      .page-header {
        padding: 34px 0 34px;
      }

      .page-header h1 {
        font-size: clamp(34px, 11vw, 56px);
        letter-spacing: 0.14em;
      }
    }

    /* ===== IMMERSIVE ARTICLE READER ===== */
    .article-reader {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #F7F8F9;
      overflow-y: auto;
      overflow-x: hidden;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .article-reader.is-open {
      display: block;
      opacity: 1;
    }

    body.reading-mode .masthead {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .reader-hero {
      width: 100%;
      max-height: 520px;
      overflow: hidden;
      background: #e4e0d8;
      line-height: 0;
    }
    .reader-hero img,
    .reader-hero video {
      width: 100%;
      max-height: 520px;
      object-fit: cover;
      display: block;
    }

    .reader-shell {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px 100px;
    }

    .reader-meta {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .reader-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 3rem;
      font-weight: 400;
      line-height: 1.15;
      color: #0a0a0a;
      margin: 0 0 3rem;
    }

    .reader-lede {
      font-family: 'Crimson Text', 'Noto Serif SC', serif;
      font-size: 1.2rem;
      font-style: italic;
      line-height: 1.75;
      color: #555;
      margin: 0 0 2.5rem;
      padding: 1.4rem 40px;
      border-top: 1px solid #d4cfc5;
      border-bottom: 1px solid #d4cfc5;
    }
    .reader-lede:empty { display: none; }

    .reader-content p {
      font-family: 'Crimson Text', 'Noto Serif SC', serif;
      font-size: 1.25rem;
      line-height: 1.85;
      color: #1f1f1f;
      margin: 0 0 1.6rem;
    }
    .reader-content p:first-of-type::first-letter {
      float: left;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 5rem;
      font-weight: 400;
      line-height: 0.82;
      padding-right: 12px;
      padding-top: 8px;
      color: #0a0a0a;
    }

    .reader-source {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid #ddd8cf;
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .reader-source:empty { display: none; }

    .reader-close {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 210;
      display: none;
      align-items: center;
      gap: 7px;
      border: none;
      background: rgba(247, 248, 249, 0.9);
      backdrop-filter: blur(6px);
      cursor: pointer;
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #1A1A1A;
      padding: 8px 14px;
      transition: opacity 0.2s;
      border: 1px solid #ddd;
    }
    .reader-close:hover { opacity: 0.6; }
    body.reading-mode .reader-close { display: inline-flex; }

    @media (max-width: 860px) {
      .reader-title { font-size: 2.2rem; }
      .reader-shell { padding: 48px 20px 80px; }
    }
    @media (max-width: 600px) {
      .reader-hero { max-height: 260px; }
      .reader-hero img, .reader-hero video { max-height: 260px; }
      .reader-shell { padding: 36px 16px 72px; }
      .reader-title { font-size: 1.65rem; line-height: 1.2; margin-bottom: 1.5rem; }
      .reader-meta { font-size: 10px; letter-spacing: 0.15em; }
      .reader-lede { font-size: 1.05rem; padding: 1rem 16px; margin-bottom: 1.5rem; }
      .reader-content p { font-size: 1.05rem; line-height: 1.75; margin-bottom: 1.2rem; }
      .reader-content p:first-of-type::first-letter {
        font-size: 3.5rem; padding-right: 8px; padding-top: 4px;
      }
      .reader-close { top: 12px; right: 12px; font-size: 10px; padding: 7px 12px; }
    }
    @media (max-width: 400px) {
      .reader-title { font-size: 1.4rem; }
      .reader-shell { padding: 28px 14px 60px; }
      .reader-content p { font-size: 1rem; }
      .reader-content p:first-of-type::first-letter { font-size: 2.8rem; }
    }
  </style>
</head>
<body>

  <!-- ===== IMMERSIVE ARTICLE READER ===== -->
  <button class="reader-close" id="reader-close-btn" aria-label="关闭阅读模式">← BACK</button>
  <div id="article-reader" class="article-reader" role="dialog" aria-modal="true" aria-label="文章阅读">

    <div class="reader-hero" id="reader-hero"></div>
    <div class="reader-shell">
      <div class="reader-layout">
        <article class="reader-main">
          <div class="reader-meta" id="reader-meta"></div>
          <h1 class="reader-title" id="reader-title"></h1>
          <blockquote class="reader-lede" id="reader-lede"></blockquote>
          <div class="reader-content" id="reader-content"></div>
          <div class="reader-source" id="reader-source"></div>
        </article>

      </div>
    </div>
  </div>

  <div class="shell">
    <header class="masthead">
      <p class="masthead-quote">On se lasse de tout excepte de connaitre.</p>
      <div class="masthead-rule" aria-hidden="true"></div>
      <div class="topbar-header">
        <a class="brand" href="index.html" aria-label="ZAOANMEIYA home">ZAOANMEIYA</a>
        <nav id="main-nav" class="nav" aria-label="main navigation">
          <button id="nav-close" class="nav-close" type="button">Close</button>
          <a href="index.html">Home</a>
          <a href="reading.html">Journal</a>
          <a href="travel.html">Photography</a>
          <a href="social.html">Philosophy</a>
          <a href="french.html">About</a>
        </nav>
        <div class="nav-actions">
          <button class="search-button" type="button" aria-label="Search">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="11" cy="11" r="6"></circle>
              <path d="M16 16L21 21"></path>
            </svg>
          </button>
          <div class="lang" aria-label="language switch">
            <button id="btn-fr" class="active" type="button">FR</button>
            <span class="lang-separator" aria-hidden="true">/</span>
            <button id="btn-cn" type="button">CN</button>
          </div>
          <button id="nav-toggle" class="nav-toggle" type="button" aria-controls="main-nav" aria-expanded="false">Menu</button>
        </div>
      </div>
      <div class="masthead-rule" aria-hidden="true"></div>
      <div class="nav-overlay" id="nav-overlay"></div>
    </header>

    <div class="page-header">
      <h1 id="page-title" data-zh="新闻" data-en="News" data-fr="News">NEWS</h1>
      <p class="page-sub" data-zh="近期文章" data-en="Recent articles" data-fr="Articles récents">近期文章</p>
    </div>

    <div class="article-body">
      <main class="articles-list" id="news-list">
        <p style="color:#8B8578;font-size:.95rem;letter-spacing:.05em;">正在加载…</p>
      </main>
    </div>
    <div class="back-home">
      <a href="index.html" data-zh="返回首页" data-en="Back to home" data-fr="Retour à l'accueil">返回首页</a>
    </div>

    <footer id="footer-text">© 2026 Une vie pensée. Chez Meiya.</footer>
  </div>

  <script>
    // ── 日期格式化 ────────────────────────────────────────────
    function fmtDate(dateStr, lang) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      if (lang === 'zh') {
        return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
      } else {
        const months = ['January','February','March','April','May','June',
          'July','August','September','October','November','December'];
        const mfr = ['janvier','février','mars','avril','mai','juin',
          'juillet','août','septembre','octobre','novembre','décembre'];
        if (lang === 'fr') return `${d.getDate()} ${mfr[d.getMonth()]} ${d.getFullYear()}`;
        return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
      }
    }

    let currentLang = 'zh';
    let newsData = [];

    function renderNews(lang) {
      const list = document.getElementById('news-list');
      if (!newsData.length) {
        list.innerHTML = '<p style="color:#8B8578;font-size:.95rem;letter-spacing:.05em;">暂无内容</p>';
        return;
      }

      const mainItems = newsData.slice(0, 4);
      const gridItems = newsData.slice(4);
      const readLabel = lang === 'fr' ? "LIRE L'ARTICLE \u2192" : 'READ FULL ARTICLE \u2192';

      const cardsHtml = mainItems.map((item, idx) => {
        const isFirst = idx === 0;
        const label = isFirst ? (lang === 'fr' ? '— À LA UNE · ' : '— 头条 · ') : '';
        const meta = fmtDate(item.date, lang);
        const rawText = (item.summary_cn || item.content_cn || '').replace(/\n+/g, ' ').trim();

        if (isFirst) {
          const label = lang === 'fr' ? 'À LA UNE · ' : '头条 · ';
          const source = item.source ? `<span style="opacity:.6"> · ${item.source}</span>` : '';
          const isVideo = item.image_path && /\.(mp4|webm|mov)$/i.test(item.image_path);
          const imgBlock = item.image_path
            ? `<div class="featured-image">
                 <figure>
                   ${isVideo
                     ? `<video class="interactive-art" autoplay muted loop playsinline
                            poster="${item.image_path.replace(/\.[^.]+$/, '.jpg')}">
                          <source src="${item.image_path}" type="video/${item.image_path.split('.').pop()}">
                        </video>`
                     : `<img class="interactive-art" src="${item.image_path}" alt="${item.title}">`}
                   ${item.image_caption ? `<figcaption>${item.image_caption}</figcaption>` : ''}
                 </figure>
               </div>`
            : '';
          return `<article id="news-${item.id}" class="article-item is-featured">
            <div class="featured-text">
              <div class="news-meta">${label}${meta}${source}</div>
              <h2>${item.title}</h2>
              <p class="article-excerpt">${rawText}</p>
              <a class="read-more" href="javascript:void(0)" data-id="${item.id}">${readLabel}</a>
            </div>
            ${imgBlock}
          </article>`;
        }

        const thumbHtml = item.image_path
          ? `<div class="card-thumb"><img src="${item.image_path}" alt="${item.title}"></div>`
          : `<div class="card-thumb-empty"></div>`;
        return `<article id="news-${item.id}" class="article-item is-card">
          ${thumbHtml}
          <div class="card-body">
            <div class="news-meta">${meta}</div>
            <h2>${item.title}</h2>
            <p class="article-excerpt">${rawText}</p>
            <a class="read-more" href="javascript:void(0)" data-id="${item.id}">${readLabel}</a>
          </div>
        </article>`;
      }).join('');

      let gridHtml = '';
      if (gridItems.length > 0) {
        const gridLabel = lang === 'fr' ? "PLUS D'ARTICLES" : '更多文章';
        gridHtml = `<section class="news-grid">
          <div class="news-grid-label">${gridLabel}</div>
          <div class="news-grid-list">
            ${gridItems.map(it => `
              <div class="grid-item" data-id="${it.id}" style="cursor:pointer;">
                <h3>${it.title}</h3>
                <div class="grid-item-meta">${fmtDate(it.date, lang)}</div>
              </div>`).join('')}
          </div>
        </section>`;
      }

      list.innerHTML = cardsHtml + gridHtml;
    }


    // ===== IMMERSIVE ARTICLE READER =====
    function openArticleModal(id) {
      const item = newsData.find(n => String(n.id) === String(id));
      if (!item) return;

      const lang = currentLang;
      const meta = fmtDate(item.date, lang);
      const source = item.source || '';

      // Hero image / video
      const heroEl = document.getElementById('reader-hero');
      if (item.image_path) {
        const isVid = /\.(mp4|webm|mov)$/i.test(item.image_path);
        heroEl.innerHTML = isVid
          ? `<video autoplay muted loop playsinline poster="${item.image_path.replace(/\.[^.]+$/, '.jpg')}"><source src="${item.image_path}"></video>`
          : `<img src="${item.image_path}" alt="${item.title}">`;
      } else {
        heroEl.innerHTML = '';
      }

      // Meta line
      document.getElementById('reader-meta').textContent = [
        lang === 'fr' ? 'À LA UNE' : '头条', meta, source
      ].filter(Boolean).join(' · ');

      // Title
      document.getElementById('reader-title').textContent = item.title;

      // Lede (italic intro) = summary
      const ledeEl = document.getElementById('reader-lede');
      ledeEl.textContent = item.summary_cn || '';

      // Body paragraphs
      const fullText = item.content_cn || item.summary_cn || '';
      const paras = fullText.split(/\n+/).filter(p => p.trim()).map(p => `<p>${p.trim()}</p>`).join('');
      document.getElementById('reader-content').innerHTML = paras || `<p>${fullText}</p>`;

      // Source
      document.getElementById('reader-source').textContent = source ? `Source: ${source}` : '';


      // Open: fade in reader, fade nav out
      const reader = document.getElementById('article-reader');
      reader.style.display = 'block';
      reader.scrollTop = 0;
      // force reflow so transition fires
      reader.getBoundingClientRect();
      reader.classList.add('is-open');
      document.body.classList.add('reading-mode');
      document.body.style.overflow = 'hidden';
    }

    function closeArticleModal() {
      const reader = document.getElementById('article-reader');
      reader.classList.remove('is-open');
      document.body.classList.remove('reading-mode');
      document.body.style.overflow = '';
      setTimeout(() => {
        reader.style.display = 'none';
        document.getElementById('reader-hero').innerHTML = '';
      }, 420);
    }

    // reader-back removed; ESC key still closes reader
    document.getElementById('reader-close-btn').addEventListener('click', closeArticleModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeArticleModal(); });

    // Event delegation for .read-more and .grid-item
    document.getElementById('news-list').addEventListener('click', function(e) {
      const btn = e.target.closest('.read-more');
      if (btn) { e.preventDefault(); openArticleModal(btn.dataset.id); return; }
      const grid = e.target.closest('.grid-item[data-id]');
      if (grid) { openArticleModal(grid.dataset.id); }
    });

    async function loadNews() {
      try {
        const res = await fetch('/api/news/public');
        if (!res.ok) throw new Error('Failed to load');
        newsData = await res.json();
        renderNews(currentLang);
      } catch (e) {
        document.getElementById('news-list').innerHTML =
          '<p style="color:#8B8578;font-size:.95rem;">暂时无法加载内容，请刷新页面。</p>';
      }
    }

    // ── 语言切换 ──────────────────────────────────────────────
    const languageStore = {
      zh: { htmlLang: "zh-CN", pageTitle: "新闻", footer: "© 2026 Une vie pensée. Chez Meiya." },
      fr: { htmlLang: "fr",    pageTitle: "NEWS",  footer: "© 2026 Une vie pensée. Chez Meiya." }
    };

    function setLanguage(lang) {
      currentLang = lang;
      const pack = languageStore[lang];
      document.documentElement.lang = pack.htmlLang;
      document.getElementById("page-title").textContent = pack.pageTitle;
      document.getElementById("footer-text").textContent = pack.footer;
      document.querySelectorAll("[data-zh][data-fr]").forEach(node => {
        node.textContent = node.getAttribute(`data-${lang}`) || node.getAttribute("data-zh");
      });
      document.getElementById("btn-fr").classList.toggle("active", lang === "fr");
      document.getElementById("btn-cn").classList.toggle("active", lang === "zh");
      renderNews(lang);
    }

    // ── 移动端导航 ────────────────────────────────────────────
    const navToggle = document.getElementById("nav-toggle");
    const navClose = document.getElementById("nav-close");
    const navOverlay = document.getElementById("nav-overlay");
    const navLinks = document.querySelectorAll("#main-nav a");

    function closeMobileNav() {
      document.body.classList.remove("nav-open");
      navToggle.setAttribute("aria-expanded", "false");
      navToggle.textContent = "Menu";
    }
    function openMobileNav() {
      document.body.classList.add("nav-open");
      navToggle.setAttribute("aria-expanded", "true");
      navToggle.textContent = "Close";
    }
    navToggle.addEventListener("click", () =>
      document.body.classList.contains("nav-open") ? closeMobileNav() : openMobileNav());
    navOverlay.addEventListener("click", closeMobileNav);
    navClose.addEventListener("click", closeMobileNav);
    navLinks.forEach(link => link.addEventListener("click", closeMobileNav));
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeMobileNav(); });
    window.matchMedia("(min-width: 681px)").addEventListener("change", e => { if (e.matches) closeMobileNav(); });

    document.getElementById("btn-fr").addEventListener("click", () => setLanguage("fr"));
    document.getElementById("btn-cn").addEventListener("click", () => setLanguage("zh"));

    loadNews();
  </script>
</html>
