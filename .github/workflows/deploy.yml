name: Deploy Personal Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static files
        run: |
          test -f index.html
          test -f travel.html
          test -f reading.html
          test -f french.html
          test -f vibe.html
          test -f social.html

      - name: Backup current website on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            mkdir -p "${{ secrets.SERVER_WEB_ROOT }}"
            ts="$(date +%F-%H%M%S)"
            bdir="${{ secrets.SERVER_WEB_ROOT }}/.deploy-backups/$ts"
            mkdir -p "$bdir"
            cd "${{ secrets.SERVER_WEB_ROOT }}"
            for f in index.html travel.html reading.html french.html vibe.html social.html; do
              [[ -f "$f" ]] && cp -a "$f" "$bdir"/
            done

      - name: Upload static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "index.html,travel.html,reading.html,french.html,vibe.html,social.html"
          target: "${{ secrets.SERVER_WEB_ROOT }}"

      - name: Test and reload nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            sudo /usr/sbin/nginx -t
            sudo /bin/systemctl reload nginx || sudo /usr/sbin/service nginx reload

      - name: Verify site
        run: |
          curl -I "http://${{ secrets.SERVER_HOST }}" | head -n 1
