<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Chez Meiya</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F7F8F9;
      font-family: "Crimson Text", Georgia, serif;
      color: #1f2428;
    }

    .card {
      width: 100%;
      max-width: 360px;
      padding: 48px 40px 40px;
      background: #fff;
      border: 1px solid #e4e8ec;
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-top {
      font-family: "Playfair Display", "Times New Roman", serif;
      font-size: 11px;
      letter-spacing: 0.7em;
      text-transform: uppercase;
      color: #888;
      display: block;
      margin-bottom: -4px;
    }
    .brand-main {
      font-family: "Playfair Display", "Times New Roman", serif;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      color: #1f2428;
    }
    .brand-sub {
      display: block;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #aaa;
      margin-top: 6px;
    }

    .error-msg {
      background: #fff4f4;
      border-left: 3px solid #cc4444;
      color: #cc4444;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-family: "Inter", sans-serif;
    }

    label {
      display: block;
      font-family: "Inter", sans-serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      border: none;
      border-bottom: 1px solid #d0d5da;
      background: transparent;
      font-family: "Crimson Text", Georgia, serif;
      font-size: 16px;
      color: #1f2428;
      padding: 6px 0 8px;
      outline: none;
      margin-bottom: 24px;
      transition: border-color 0.2s;
    }
    input:focus { border-bottom-color: #1f2428; }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #1f2428;
      color: #fff;
      border: none;
      font-family: "Inter", sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    button[type="submit"]:hover { background: #2d3540; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="brand-top">Chez</span>
      <span class="brand-main">Meiya</span>
      <span class="brand-sub">Admin</span>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/une-vie-admin/login" autocomplete="off">
      <label for="username">用户名</label>
      <input id="username" name="username" type="text" required autofocus />

      <label for="password">密码</label>
      <input id="password" name="password" type="password" required />

      <button type="submit">进入后台</button>
    </form>
  </div>
</body>
</html>
